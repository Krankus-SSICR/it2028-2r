<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC Draci Humpolec</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Přidání hráče na soupisku</h2>
    
    <form action="pridat_hrace.php" method="POST">
        <h3>Osobní údaje: </h3>
        <div class="form-group">
            <label for="jmeno">Jméno hráče: </label>
            <input type="text" id="jmeno" name="jmeno">
        </div>
        <div class="form-group">
            <label for="prijmeni">Příjmení hráče: </label>
            <input type="text" id="prijmeni" name="prijmeni">
        </div>
        <div class="form-group">
            <label for="vyska">Výška hráče v cm: </label>
            <input type="number" min="0" max="250" id="vyska" name="vyska">
        </div>
        <div class="form-group">
            <label for="vaha">Hmotnost hráče v kg: </label>
            <input type="number" min="0" max="250" id="vyska" name="vyska">
        </div>
        <h3>Informace o hráči</h3>
        <div class="form-group informace">
            <label for="dres">Číslo dresu: </label>
            <input type="number" min="1" max="99" id="dres" name="dres">
        </div>
        <input type="submit" value="Přidat hráče">
    </form>
</body>
</html>
