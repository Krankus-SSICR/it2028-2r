<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Zimní sporty</h2>
    <table border="1px ">
        <thead>
        <tr style="height: 35px; background: salmon; ">
            <td>Název sportu</td>    
            <td>Potřebné náčiní</td>
            <td>Náročnost</td>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td colspan="3">Lední sporty</td>
        </tr>
        <tr>
            <td>Lední hokej</td>
            <td rowspan="2">Helma</td>
            <td>4/5</td>
        </tr>
        <tr>
            <td>Bobování</td>
            <td> 3/5</td>
        </tr>
        </tbody>
    </table>
    <h3>Půjčení lyží/snowbordu</h3>
    <form>
        <label for="jmeno" >Jméno: </label>
        <input type="text" id="jmeno">
        <select>
            <option>Vybertee měsíc</option>
            <option>Říjen</option>
            <option>Listopad</option>
            <option>Prosinec</option>
        </select>
    </form>
</body>

</html>
