<!DOCTYPE html>
<html lang="cs">
<!--nastavení jazyka webu cs = český jazyk-->

<head>
    <meta charset="UTF-8">
    <!--nastavení knihovny znaků-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--nastavuje přizpůsobení velikosti zobrazovaného zařízení-->
    <meta name="description" content="Zde se píše popis našeho webu">

    <meta name="robots" content="index, follow">
    <!--povolí robotům zaindexovat web do "katalogu", follow povolí robotům kontrolovat hypertextové odkazy-->

    <!--Open grapf (og)-->
    <meta propery="og:title" content="Název pro odkaz">
    <meta propery="og:description" content="Zobrazovaný popisek">
    <meta propery="og:image" content="https://www.nasweb.cz/img/nas-obrazek.jpg">
    <meta propery="og:type" content="article">
    <meta propery="og:url" content="https://konkretnicastwebu.cz">
    


    <title>Název webu - část webu, na které se nacházíme</title>
</head>

<body>
    <p>Správná struktura odstavců</p>
    <h1 style="display: none;">Hlavní nadpis</h1>
    <!--pouze jeden na celém webu-->
    <h2>Názvy částí webu, klíčová slova</h2>
    
    <h3>Správně připavená navigace</h3>
    <nav>
        <ul>
            <li><a href="">Část 1</a></li>
            <li><a href="">Část 2</a></li>
            <li><a href="">Část 3</a></li>
            <li><a href="">Část 5</a></li>
        </ul>
    </nav>
</body>

</html>
